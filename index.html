<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>持仓全景图</title>
<style>
:root{ color-scheme: light; }
*{ box-sizing:border-box; margin:0; padding:0; }
body{ background:transparent; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
.wrap{
  background:#0a0e16;
  background-image:radial-gradient(1200px 500px at 80% -10%, rgba(56,189,248,.10), transparent),
                  radial-gradient(900px 500px at 0% 110%, rgba(168,85,247,.10), transparent);
  border-radius:20px; padding:24px; color:#e6edf3;
}
.head{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:20px; }
.head-l{ display:flex; align-items:center; gap:14px; }
.avatar{ width:54px; height:54px; border-radius:50%; background:linear-gradient(135deg,#38bdf8,#a855f7); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:#fff; }
.brand{ font-size:12px; color:#7dd3fc; font-weight:600; letter-spacing:.5px; display:flex; align-items:center; gap:6px; }
.brand .dot{ width:7px; height:7px; border-radius:50%; background:#22c55e; }
.title{ font-size:26px; font-weight:800; letter-spacing:1px; margin:2px 0; }
.sub{ font-size:12px; color:#8b97a7; }
.pnl-badge{ text-align:right; background:linear-gradient(135deg,rgba(34,197,94,.12),rgba(34,197,94,.04)); border:1px solid rgba(34,197,94,.25); border-radius:16px; padding:10px 20px; }
.pnl-badge.up{ background:linear-gradient(135deg,rgba(244,63,94,.12),rgba(244,63,94,.04)); border-color:rgba(244,63,94,.3); }
.pnl-badge .lbl{ font-size:11px; color:#8b97a7; }
.pnl-badge .val{ font-size:30px; font-weight:800; line-height:1.1; }
.cards{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:14px; }
.card{ background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07); border-radius:14px; padding:14px 16px; }
.card .k{ font-size:12px; color:#8b97a7; margin-bottom:6px; }
.card .v{ font-size:24px; font-weight:800; }
.card .h{ font-size:11px; color:#6b7787; margin-top:4px; }
.eq{ font-size:12px; color:#8b97a7; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); border-radius:10px; padding:8px 14px; margin-bottom:22px; }
.eq b{ color:#e6edf3; }
.sec-h{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
.sec-h h2{ font-size:16px; font-weight:700; }
.sec-h .note{ font-size:11px; color:#6b7787; }
#tree{ position:relative; width:100%; height:520px; border-radius:14px; overflow:hidden; background:rgba(255,255,255,.02); }
.tile{ position:absolute; border-radius:10px; overflow:hidden; cursor:default; transition:transform .12s ease, box-shadow .12s ease; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:6px; }
.tile:hover{ transform:scale(1.012); box-shadow:0 0 0 2px rgba(255,255,255,.35) inset; z-index:5; }
.tile .tk{ font-weight:800; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.45); }
.tile .pc{ color:rgba(255,255,255,.92); font-weight:600; text-shadow:0 1px 4px rgba(0,0,0,.4); margin-top:2px; }
.tile .mv{ color:rgba(255,255,255,.78); text-shadow:0 1px 4px rgba(0,0,0,.4); }
.tile .pl{ font-weight:600; margin-top:1px; }
.secbar{ display:flex; height:34px; border-radius:10px; overflow:hidden; margin-top:22px; }
.secbar div{ display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#06121f; white-space:nowrap; }
.legend{ display:flex; flex-wrap:wrap; gap:16px; margin-top:12px; }
.legend span{ font-size:12px; color:#aab4c2; display:flex; align-items:center; gap:6px; }
.legend i{ width:11px; height:11px; border-radius:3px; display:inline-block; }
table{ width:100%; border-collapse:collapse; margin-top:22px; font-size:13px; }
th,td{ text-align:right; padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.06); }
th{ color:#8b97a7; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.4px; }
td.l,th.l{ text-align:left; }
.tk-cell{ font-weight:700; }
.tk-cell small{ display:block; color:#8b97a7; font-weight:400; font-size:11px; }
.chip{ font-size:11px; padding:2px 8px; border-radius:20px; color:#fff; }
.up{ color:#f43f5e; } .down{ color:#22c55e; }
.foot{ font-size:11px; color:#5b6675; margin-top:18px; line-height:1.6; }
.src{ display:inline-block; padding:1px 7px; border-radius:6px; font-size:10px; font-weight:700; margin-left:6px; }
.src.ib{ background:rgba(56,189,248,.15); color:#7dd3fc; }
.src.lb{ background:rgba(248,113,113,.15); color:#fca5a5; }
.src.pre{ background:rgba(244,114,182,.15); color:#f9a8d4; }
.src.cash{ background:rgba(148,163,184,.18); color:#cbd5e1; }
@media(max-width:680px){ .cards{ grid-template-columns:repeat(2,1fr);} #tree{height:560px;} table{font-size:12px;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="head-l">
      <div class="avatar">M</div>
      <div>
        <div class="brand"><span class="dot"></span> Miro · 美股持仓</div>
        <div class="title">持仓全景图</div>
        <div class="sub" id="sub">按板块分类 · IBKR + 长桥合并</div>
      </div>
    </div>
    <div class="pnl-badge" id="pnlBadge">
      <div class="lbl">浮动盈亏</div>
      <div class="val" id="pnlPct">—</div>
    </div>
  </div>

  <div class="cards">
    <div class="card"><div class="k">总资产</div><div class="v" id="cNet">—</div><div class="h" id="cNetH">IBKR + 长桥 + Pre-IPO</div></div>
    <div class="card"><div class="k">股票市值</div><div class="v" id="cStk">—</div><div class="h" id="cStkH">占总资产 —</div></div>
    <div class="card"><div class="k">Pre-IPO 一级市场</div><div class="v" id="cPre">—</div><div class="h" id="cPreH">占总资产 —</div></div>
    <div class="card"><div class="k">现金</div><div class="v" id="cCash">—</div><div class="h" id="cCashH">占总资产 —</div></div>
  </div>
  <div class="eq" id="eqLine">加载中…</div>

  <div class="sec-h">
    <h2>持仓地图</h2>
    <div class="note">方块面积 = 仓位市值占比　|　颜色 = 板块</div>
  </div>
  <div id="tree"></div>

  <div class="secbar" id="secbar"></div>
  <div class="legend" id="legend"></div>

  <table id="holdTable">
    <thead><tr>
      <th class="l">标的</th><th class="l">板块</th><th>股数</th><th>现价</th><th>市值</th><th>成本</th><th>浮动盈亏</th><th>占比</th>
    </tr></thead>
    <tbody></tbody>
  </table>

  <div class="foot" id="foot"></div>
</div>

<script>
// ---------- 静态：长桥持仓（来自截图，无法实时拉取）----------
const LB = [
  {tk:"RBLX", name:"Roblox",              qty:18, price:49.600, cost:45.929},
  {tk:"DRAM", name:"Roundhill Memory ETF",qty:9,  price:68.900, cost:65.110},
  {tk:"ORCL", name:"Oracle",              qty:3,  price:186.712,cost:180.770},
  {tk:"FOTO", name:"Tuttle Photonics",    qty:15, price:24.176, cost:24.240},
  {tk:"NOK",  name:"Nokia Oyj",           qty:25, price:14.010, cost:14.550},
  {tk:"FSLY", name:"Fastly",              qty:15, price:17.650, cost:23.840},
  {tk:"CRCL", name:"Circle",              qty:3,  price:80.170, cost:105.133},
];
const LB_NET = 4197.71; // 长桥美股账户净值（截图，含现金；股票市值约 3291，现金约 907）

// IBKR 兜底快照（若实时拉取失败时使用）— 由定时任务自动刷新，勿手动改 marker 之间内容
/*IBKR_SNAPSHOT_START*/
const IB_FALLBACK = {positions:[
  {contract_description:"AMKR",position:5.0,market_price:63.52,market_value:317.6,average_price:65.23526,unrealized_pnl:-8.58},
  {contract_description:"CIEN",position:1.0,market_price:476.05,market_value:476.05,average_price:513.4715,unrealized_pnl:-37.42},
  {contract_description:"NOK",position:23.0,market_price:14.1,market_value:324.3,average_price:14.61473,unrealized_pnl:-11.84},
  {contract_description:"SITM",position:0.6,market_price:621.1,market_value:372.66,average_price:686.584,unrealized_pnl:-39.29},
  {contract_description:"TTMI",position:2.0,market_price:165.47,market_value:330.94,average_price:173.26475,unrealized_pnl:-15.59},
]};
const IB_NET_FALLBACK = 2323.27;
const IB_SNAPSHOT_TIME = "2026-06-06 11:48 UTC";
/*IBKR_SNAPSHOT_END*/

const NAMES = {NOK:"Nokia Oyj",AMKR:"Amkor Tech",CIEN:"Ciena",SITM:"SiTime",TTMI:"TTM Technologies",RBLX:"Roblox",FOTO:"Tuttle Photonics ETF",FSLY:"Fastly",CRCL:"Circle",DRAM:"Roundhill Memory ETF",ORCL:"Oracle"};

// ---------- 板块映射 ----------
const SECTOR = {
  NOK:"光通讯", CIEN:"光通讯", FOTO:"光通讯",
  AMKR:"半导体/AI基建", SITM:"半导体/AI基建", TTMI:"半导体/AI基建", DRAM:"半导体/AI基建", ORCL:"半导体/AI基建",
  RBLX:"AI应用", FSLY:"AI应用",
  CRCL:"加密货币",
};
const SECTOR_HUE = {"光通讯":265, "半导体/AI基建":192, "AI应用":150, "Pre-IPO 一级市场":330, "加密货币":35, "现金":210, "其他":220};
const SECTOR_ORDER = ["光通讯","半导体/AI基建","AI应用","Pre-IPO 一级市场","加密货币","现金","其他"];

// 静态：Pre-IPO 一级市场持仓（约 $675）
const PREIPO = [
  {tk:"SpaceX",    name:"SpaceX (Pre-IPO)",    mv:425, sector:"Pre-IPO 一级市场", src:["PreIPO"], kind:"preipo"},
  {tk:"Anthropic", name:"Anthropic (Pre-IPO)", mv:250, sector:"Pre-IPO 一级市场", src:["PreIPO"], kind:"preipo"},
];

function fmt(n){ return "$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:0}); }
function fmt2(n){ return Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function pls(n){ return (n>=0?"+":"")+fmt2(n); }

async function getIBKR(){
  try{
    const r = await window.cowork.callMcpTool("mcp__697f6c1e-9419-43c2-abf9-93373a2765dd__get_account_positions",{});
    const data = r.structuredContent ?? JSON.parse(r.content[0].text);
    let net = IB_NET_FALLBACK;
    try{
      const s = await window.cowork.callMcpTool("mcp__697f6c1e-9419-43c2-abf9-93373a2765dd__get_account_summary",{});
      const sd = s.structuredContent ?? JSON.parse(s.content[0].text);
      if(sd && sd.net_liquidation) net = sd.net_liquidation;
    }catch(e){}
    return {positions:data.positions||[], net};
  }catch(e){
    return {positions:IB_FALLBACK.positions, net:IB_NET_FALLBACK};
  }
}

function buildHoldings(ib){
  // 合并 IBKR + 长桥（按 ticker），累加 市值/成本/盈亏
  const map = {};
  function add(tk, qty, mv, costTotal, pnl, price, src){
    tk = (tk||"").toUpperCase();
    if(!map[tk]) map[tk]={tk, qty:0, mv:0, costTotal:0, pnl:0, price:price, src:new Set()};
    map[tk].qty += qty; map[tk].mv += mv; map[tk].costTotal += costTotal; map[tk].pnl += pnl;
    if(price) map[tk].price = price; map[tk].src.add(src);
  }
  (ib.positions||[]).forEach(p=>{
    if(!p.position) return;
    add(p.contract_description, p.position, p.market_value, p.average_price*p.position, p.unrealized_pnl, p.market_price, "IB");
  });
  LB.forEach(p=>{
    const mv = p.qty*p.price;
    add(p.tk, p.qty, mv, p.qty*p.cost, mv - p.qty*p.cost, p.price, "LB");
  });
  let arr = Object.values(map).map(h=>({
    ...h, name:NAMES[h.tk]||h.tk, sector:SECTOR[h.tk]||"其他",
    avgCost:h.costTotal/h.qty, plPct:(h.mv-h.costTotal)/h.costTotal*100,
    src:[...h.src], kind:"stock"
  }));
  arr.sort((a,b)=>b.mv-a.mv);
  return arr;
}

// ---------- squarified treemap ----------
function squarify(items, rect){
  const out=[]; const arr=items.slice().sort((a,b)=>b.value-a.value);
  const total=arr.reduce((s,d)=>s+d.value,0)||1; const area=rect.w*rect.h;
  const vals=arr.map(d=>d.value/total*area);
  let r={x:rect.x,y:rect.y,w:rect.w,h:rect.h}, i=0;
  const worst=(row,len)=>{const s=row.reduce((a,b)=>a+b,0),mx=Math.max(...row),mn=Math.min(...row);return Math.max(len*len*mx/(s*s),s*s/(len*len*mn));};
  while(i<vals.length){
    const len=Math.min(r.w,r.h); let rowI=[], rowV=[];
    while(i<vals.length){
      const test=rowV.concat(vals[i]);
      if(rowV.length===0 || worst(test,len)<=worst(rowV,len)){ rowV=test; rowI.push(arr[i]); i++; } else break;
    }
    const sum=rowV.reduce((a,b)=>a+b,0), thick=sum/len;
    if(r.w>=r.h){ let oy=r.y; for(let k=0;k<rowI.length;k++){const hh=rowV[k]/thick; out.push(Object.assign({},rowI[k],{x:r.x,y:oy,w:thick,h:hh})); oy+=hh;} r.x+=thick; r.w-=thick; }
    else { let ox=r.x; for(let k=0;k<rowI.length;k++){const ww=rowV[k]/thick; out.push(Object.assign({},rowI[k],{x:ox,y:r.y,w:ww,h:thick})); ox+=ww;} r.y+=thick; r.h-=thick; }
  }
  return out;
}

function tileColor(sector, t){ // t 0..1, 越大越亮
  if(sector==="现金"){ const l=28+t*14; return `hsl(210 8% ${l}%)`; }
  const hue=SECTOR_HUE[sector]||220;
  const l=42+t*22, s=62-t*8;
  return `hsl(${hue} ${s}% ${l}%)`;
}
function srcLabel(s){ return s==="IB"?"IBKR":s==="LB"?"长桥":s==="PreIPO"?"Pre-IPO":s==="Cash"?"现金":s; }
function srcCls(s){ return s==="IB"?"ib":s==="LB"?"lb":s==="PreIPO"?"pre":"cash"; }

function render(state){
  const holdings = state.all;            // 全部方块：股票 + Pre-IPO + 现金
  const totalMV = holdings.reduce((s,h)=>s+h.mv,0);   // 总资产
  const {net, stockMV, cash} = state.summary;
  const preMV = holdings.filter(h=>h.kind==="preipo").reduce((s,h)=>s+h.mv,0);

  // 板块聚合
  const secMap={};
  holdings.forEach(h=>{ (secMap[h.sector]=secMap[h.sector]||{sector:h.sector,value:0,items:[]}); secMap[h.sector].value+=h.mv; secMap[h.sector].items.push(h); });
  const sectors = SECTOR_ORDER.filter(s=>secMap[s]).map(s=>secMap[s]);

  // --- treemap：先排板块，再排板块内标的（嵌套）---
  const el=document.getElementById("tree"); el.innerHTML="";
  const W=el.clientWidth, H=el.clientHeight, gap=4;
  const secRects=squarify(sectors.map(s=>({value:s.value,ref:s})),{x:0,y:0,w:W,h:H});
  secRects.forEach(sr=>{
    const items=sr.ref.items.slice().sort((a,b)=>b.mv-a.mv);
    const inner={x:sr.x+gap,y:sr.y+gap,w:Math.max(1,sr.w-gap*2),h:Math.max(1,sr.h-gap*2)};
    const tiles=squarify(items.map(h=>({value:h.mv,ref:h})),inner);
    const maxV=Math.max(...items.map(h=>h.mv));
    tiles.forEach(t=>{
      const h=t.ref, d=document.createElement("div"); d.className="tile";
      d.style.left=(t.x+gap/2)+"px"; d.style.top=(t.y+gap/2)+"px";
      d.style.width=Math.max(0,t.w-gap)+"px"; d.style.height=Math.max(0,t.h-gap)+"px";
      d.style.background=tileColor(sr.ref.sector, h.mv/maxV);
      const pct=(h.mv/totalMV*100);
      const area=t.w*t.h; const big=area>9000, mid=area>4200;
      const hasPL = h.kind==="stock";
      const plCol = h.pnl>=0?"#fecdd3":"#bbf7d0";
      d.innerHTML =
        `<div class="tk" style="font-size:${big?17:mid?14:11}px">${h.tk}</div>`+
        (mid?`<div class="pc" style="font-size:${big?13:11}px">${pct.toFixed(1)}%</div>`:"")+
        (big?`<div class="mv" style="font-size:11px">${fmt(h.mv)}</div>`:"")+
        (big&&hasPL?`<div class="pl" style="font-size:11px;color:${plCol}">${h.plPct>=0?"+":""}${h.plPct.toFixed(1)}%</div>`:"");
      d.title=`${h.tk} ${h.name}\n板块：${h.sector}\n市值：${fmt2(h.mv)}  占比：${pct.toFixed(1)}%`+
              (hasPL?`\n浮动盈亏：${pls(h.pnl)} (${h.plPct.toFixed(1)}%)`:"")+`\n来源：${h.src.map(srcLabel).join("+")}`;
      el.appendChild(d);
    });
  });

  // --- 板块条 + 图例 ---
  const bar=document.getElementById("secbar"); bar.innerHTML="";
  const lg=document.getElementById("legend"); lg.innerHTML="";
  sectors.forEach(s=>{
    const pct=s.value/totalMV*100;
    const seg=document.createElement("div"); seg.style.width=pct+"%"; seg.style.background=tileColor(s.sector,.8);
    seg.textContent = pct>6? `${s.sector} ${pct.toFixed(0)}%` : "";
    seg.title=`${s.sector} ${pct.toFixed(1)}%`; bar.appendChild(seg);
    const sp=document.createElement("span"); sp.innerHTML=`<i style="background:${tileColor(s.sector,.8)}"></i>${s.sector} ${pct.toFixed(1)}%`; lg.appendChild(sp);
  });

  // --- 表格 ---
  const tb=document.querySelector("#holdTable tbody"); tb.innerHTML="";
  holdings.forEach(h=>{
    const pct=h.mv/totalMV*100;
    const srcChips=h.src.map(s=>`<span class="src ${srcCls(s)}">${srcLabel(s)}</span>`).join("");
    const isStk = h.kind==="stock";
    const plCell = isStk
      ? `<td class="${h.pnl>=0?'up':'down'}">${pls(h.pnl)}<br><small class="${h.pnl>=0?'up':'down'}">${h.plPct>=0?'+':''}${h.plPct.toFixed(1)}%</small></td>`
      : `<td style="color:#5b6675">—</td>`;
    const tr=document.createElement("tr");
    tr.innerHTML=
      `<td class="l tk-cell">${h.tk} ${srcChips}<small>${h.name}</small></td>`+
      `<td class="l"><span class="chip" style="background:${tileColor(h.sector,.7)}">${h.sector}</span></td>`+
      `<td>${isStk?(+h.qty.toFixed(2)):"—"}</td>`+
      `<td>${isStk?fmt2(h.price):"—"}</td>`+
      `<td>${fmt(h.mv)}</td>`+
      `<td>${isStk?fmt2(h.avgCost):"—"}</td>`+
      plCell+
      `<td>${pct.toFixed(1)}%</td>`;
    tb.appendChild(tr);
  });

  // --- 顶部卡片 ---
  const stockCost=state.stocks.reduce((s,h)=>s+h.costTotal,0);
  const stockPnl=stockMV-stockCost, pnlPct=stockPnl/stockCost*100;
  const up = stockPnl>=0;
  document.getElementById("cNet").textContent=fmt(totalMV);
  document.getElementById("cStk").textContent=fmt(stockMV);
  document.getElementById("cStkH").textContent=`占总资产 ${(stockMV/totalMV*100).toFixed(0)}%`;
  document.getElementById("cPre").textContent=fmt(preMV);
  document.getElementById("cPreH").textContent=`占总资产 ${(preMV/totalMV*100).toFixed(1)}%`;
  document.getElementById("cCash").textContent=fmt(cash);
  document.getElementById("cCashH").textContent=`占总资产 ${(cash/totalMV*100).toFixed(1)}%`;
  document.getElementById("pnlPct").innerHTML=`${pnlPct>=0?'+':''}${pnlPct.toFixed(1)}%`;
  const badge=document.getElementById("pnlBadge"); badge.className="pnl-badge"+(up?" up":"");
  document.getElementById("eqLine").innerHTML=
    `<b>${(stockMV/totalMV*100).toFixed(0)}%</b> 股票 + <b>${(preMV/totalMV*100).toFixed(1)}%</b> Pre-IPO + <b>${(cash/totalMV*100).toFixed(1)}%</b> 现金 = <b>100%</b> 总资产　·　股票浮动盈亏 <b class="${up?'up':'down'}">${pls(stockPnl)} (${pnlPct.toFixed(1)}%)</b>`;
  document.getElementById("sub").textContent=`按板块分类 · ${holdings.length} 个方块 · ${sectors.length} 大板块 · IBKR + 长桥 + Pre-IPO`;
  const live = !!(window.cowork && window.cowork.callMcpTool);
  document.getElementById("foot").innerHTML=
    (live
      ? `<span class="src ib">IBKR</span> 实时拉取（持仓 + 现价 + 净值）　<span class="src lb">长桥</span> / <span class="src pre">Pre-IPO</span> / <span class="src cash">现金</span> 静态数据`
      : `<b style="color:#fbbf24">⚠ 静态快照</b>（IBKR 数据为定时任务生成的快照，每交易日收盘后自动更新）　<span class="src lb">长桥</span> / <span class="src pre">Pre-IPO</span> / <span class="src cash">现金</span> 静态数据`)
    + `<br>${live?"数据更新时间："+new Date().toLocaleString("zh-CN"):"快照时间："+IB_SNAPSHOT_TIME}　·　方块面积=市值占比　·　颜色越亮代表板块内市值越大　·　红涨绿跌（Pre-IPO/现金无浮动盈亏）`;
}

let CUR=null;
async function run(){
  const ib=await getIBKR();
  const net = ib.net + LB_NET;                 // 券商净值 = 股票 + 现金
  const stocks = buildHoldings(ib);
  const stockMV = stocks.reduce((s,h)=>s+h.mv,0);
  const cash = Math.max(net - stockMV, 0);     // 合并现金
  const cashTile = {tk:"现金", name:"现金 Cash", mv:cash, sector:"现金", src:["Cash"], kind:"cash"};
  const all = stocks.concat(PREIPO.map(p=>({...p}))).concat([cashTile]);
  CUR = {all, stocks, summary:{net, stockMV, cash}};
  render(CUR);
}
window.addEventListener("resize", ()=>{ if(CUR) render(CUR); });
run();
</script>
